name: Release RPM

on:
  push:
    branches:
      - main

jobs:
  release-rpm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - name: Install rpm tools
        run: sudo apt-get update && sudo apt-get install -y rpm file binutils
      - name: Read version
        id: version
        run: echo "VERSION=$(cat VERSION)" >> $GITHUB_ENV
      - name: Build rpm
        run: make rpm GOARCH=amd64 RPM_ARCH=x86_64 VERSION=${{ env.VERSION }} RELEASE=1
      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: v${{ env.VERSION }}
          draft: false
          prerelease: false
      - name: Upload RPM to Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/rpmbuild/RPMS/**/*.rpm
          tag_name: v${{ env.VERSION }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
