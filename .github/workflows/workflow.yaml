on: [push]
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with: 
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - uses: golangci/golangci-lint-action@v9
      - run: make lint
      - run: make test
      - run: make image
      - name: Run test
        run: make e2e

  rpm-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - name: Install rpm tools
        run: sudo apt-get update && sudo apt-get install -y rpm file binutils
      - name: Build rpm
        run: make rpm GOARCH=amd64 RPM_ARCH=x86_64 RELEASE=${{ github.run_number }}
      - name: Upload rpm artifact
        uses: actions/upload-artifact@v4
        with:
          name: healthd-rpm
          path: build/rpmbuild/RPMS/**/*.rpm
  

